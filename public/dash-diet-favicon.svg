  <!-- Heart -->
  <path d="M32 18 C32 10, 22 4, 16 8 C10 12, 8 20, 16 30 L32 48 L48 30 C56 20, 54 12, 48 8 C42 4, 32 10, 32 18 Z" fill="url(#heartGrad)" />

